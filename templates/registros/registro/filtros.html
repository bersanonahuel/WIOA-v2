<div class="accordion" id="filtros">
    <div class="card card-outline card-info">
        <div class="card-header">
            <h3 class="card-title"> Filtros </h3>

            <div class="card-tools">
                <button type="button" class="btn btn-tool btn-sm" data-card-widget="collapse" title="Collapse">
                    <i class="fas fa-minus"></i>
                </button>
            </div>
        
        </div>

        <div id="filtros-details" class="collapse show" aria-labelledby="headingOne" data-parent="#filtros">
            <div class="card-body">
                <form method="GET" id="formRegistrosFiltros" action="../listarRegistro">

                    <div class="form-group d-flex ">
                        <div class="form-group-filters mr-2 {% if filter.form.proyecto_servicio__proyecto.errors %}has-error{% endif %}">
                            <label class="control-label font-weight-bold" for="{{ filter.form.proyecto_servicio__proyecto.auto_id }}"> {{ filter.form.proyecto_servicio__proyecto.label }}: </label>
                            <div>{{filter.form.proyecto_servicio__proyecto}}</div>
                        </div>

                        <div class="form-group-filters mr-2 {% if filter.form.proyecto_servicio__servicio.errors %}has-error{% endif %}">
                            <label class="control-label font-weight-bold" for="{{ filter.form.proyecto_servicio__servicio.auto_id }}"> {{ filter.form.proyecto_servicio__servicio.label }}: </label>
                            <div>{{filter.form.proyecto_servicio__servicio}}</div>
                        </div>
                        
                        <div class="form-group-filters mr-2 {% if filter.form.alumno.errors %}has-error{% endif %}">
                            <label class="control-label font-weight-bold" for="{{ filter.form.alumno.auto_id }}"> {{ filter.form.alumno.label }}: </label>
                            <div>{{filter.form.alumno}}</div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" ><i class="fas fa-user"></i> Informe Por Participante (Hs)</button>
                    <button type="button" class="btn btn-primary" onClick="listarRegistroPorProyecto();" ><i class="fas fa-list-alt"></i> Informe Por Proyecto</button>
                    
                    <a class="btn btn-secondary" href="{% url 'registros:listarRegistro'%}">Limpiar</a>
                    
                </form>
            </div>
        </div>

        <div class="card-footer">
        </div>
    </div>
</div>
